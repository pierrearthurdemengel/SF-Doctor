services:

    # --- Lecture de configuration ---

    SfDoctor\Config\YamlConfigReader:
        public: true
        arguments:
            $projectPath: '%kernel.project_dir%'

    # --- Resolution des parametres ---
    # En mode bundle, on a acces au ParameterBag du container.
    # "@parameter_bag" est un alias Symfony qui pointe vers
    # le service Symfony\Component\DependencyInjection\ParameterBag\ParameterBagInterface.

    SfDoctor\Config\ContainerParameterResolver:
        public: true
        arguments:
            $parameterBag: '@parameter_bag'

    # --- Analyzers Security ---

    SfDoctor\Analyzer\Security\FirewallAnalyzer:
        public: true
        arguments:
            $configReader: '@SfDoctor\Config\YamlConfigReader'
            $parameterResolver: '@SfDoctor\Config\ContainerParameterResolver'

    SfDoctor\Analyzer\Security\AccessControlAnalyzer:
        public: true
        arguments:
            $configReader: '@SfDoctor\Config\YamlConfigReader'
            $parameterResolver: '@SfDoctor\Config\ContainerParameterResolver'

    SfDoctor\Analyzer\Security\CsrfAnalyzer:
        public: true
        arguments:
            $projectPath: '%kernel.project_dir%'
            $configReader: '@SfDoctor\Config\YamlConfigReader'
            $parameterResolver: '@SfDoctor\Config\ContainerParameterResolver'

    # --- Commande CLI ---

    SfDoctor\Command\AuditCommand:
        public: true
        arguments:
            $analyzers: !tagged_iterator sf_doctor.analyzer
            $reporters: !tagged_iterator sf_doctor.reporter
            $projectPath: '%kernel.project_dir%'
            $parameterResolver: '@SfDoctor\Config\ContainerParameterResolver'
        tags: ['console.command']